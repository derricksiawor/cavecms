# Dev convenience: spin up the MariaDB the app expects on 127.0.0.1:3306.
# Optional — if you already have MariaDB / MySQL installed on the host
# pointing at port 3306, ignore this file. If you do use it:
#
#   docker compose -f docker-compose.dev.yml up -d --wait
#   pnpm db:migrate    # apply schema
#   pnpm db:seed       # seed admin + settings
#   pnpm dev
#
# NOT a production compose file. The `bwc:bwc@127.0.0.1:3306` URL in
# .env.example points here intentionally so contributors who don't
# have a host MariaDB can boot the stack with one command.

services:
  mariadb:
    image: mariadb:10.11
    container_name: bwc-mariadb-dev
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: rootpass
      MARIADB_DATABASE: bwc
      MARIADB_USER: bwc
      # Dev-only password — production uses a 64-hex-char value
      # auto-generated by setup-shared.sh.
      MARIADB_PASSWORD: CHANGE_ME
    ports:
      # Bind to loopback only so the dev DB never accidentally
      # accepts remote connections from a coffee-shop Wi-Fi peer.
      - "127.0.0.1:3306:3306"
    volumes:
      - bwc-mariadb-dev-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -uroot -prootpass --silent"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  bwc-mariadb-dev-data:
