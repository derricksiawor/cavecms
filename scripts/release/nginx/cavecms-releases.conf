# cavecms-releases.conf
#
# Release-distribution endpoints served as static files from
# /var/www/cavecms-releases/. Lives outside the cavecms-web Next.js git tree
# so `connect deploy cavecms-web` never touches release artifacts.
#
# Included from the cavecms.derricksiawor.com server block in
# /etc/nginx/conf.d/custom-sites.conf. MUST be included BEFORE the
# `location /` proxy_pass — `location =` (exact-match) takes priority
# over `location /` regardless of order, but `location /releases/`
# (prefix) only beats `location /` when listed first.

# Full release index — every version's sha256 + signature + notes.
# Cache-Control no-store so a new release propagates instantly.
location = /manifest.json {
    alias /var/www/cavecms-releases/manifest.json;
    add_header Cache-Control "no-store" always;
    default_type application/json;
}

location = /manifest.json.sig {
    alias /var/www/cavecms-releases/manifest.json.sig;
    add_header Cache-Control "public, max-age=300" always;
    default_type text/plain;
}

# In-app updater manifest — what lib/updates/checkLatestRelease.ts polls.
# Single-version "what's the current stable channel" pointer. The 12h
# in-process scheduler reads this; no-store keeps the propagation window
# bounded by the scheduler tick rather than CDN cache TTL.
location = /updates/latest.json {
    alias /var/www/cavecms-releases/updates/latest.json;
    add_header Cache-Control "no-store" always;
    default_type application/json;
}

# Ed25519 public key for offline release verification by the CLI / orchestrator.
location = /pubkey.pem {
    alias /var/www/cavecms-releases/pubkey.pem;
    add_header Cache-Control "public, max-age=3600" always;
    default_type application/x-pem-file;
}

# "Always current" pointer — `npx create-cavecms` downloads this directly.
location = /latest.zip {
    alias /var/www/cavecms-releases/latest.zip;
    add_header Cache-Control "no-store" always;
    default_type application/zip;
}

location = /latest.zip.sha256 {
    alias /var/www/cavecms-releases/latest.zip.sha256;
    add_header Cache-Control "no-store" always;
    default_type text/plain;
}

# Per-version downloads. ~70 MiB each. nginx streams them directly with no
# proxy hop, and the immutable Cache-Control lets CDNs (Cloudflare in front
# of this) cache them forever — the URL is content-addressed by version.
location /releases/ {
    alias /var/www/cavecms-releases/releases/;
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    autoindex off;
}
