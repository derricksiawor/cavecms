# TLS hardening — applied to every 443 server block.
# Include via: include /etc/nginx/snippets/bwc-tls.conf;

# Hide the nginx version from `Server:` headers and error pages.
# Defence-in-depth even if upstream Next.js correctly sets
# `poweredByHeader: false` — surface-area reduction.
server_tokens off;

# TLS 1.2 + 1.3 only. The cipher list is Mozilla "intermediate"
# minus CBC suites. `ssl_prefer_server_ciphers off` is correct for
# TLS 1.3 (directive ignored anyway) and harmless for TLS 1.2 with
# modern clients.
ssl_protocols TLSv1.2 TLSv1.3;
ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305';
ssl_prefer_server_ciphers off;

# Session cache: 10 MiB ≈ 40k sessions cached for 1 day. Tickets
# disabled because they're an out-of-band session reuse mechanism
# that defeats forward secrecy if the ticket key leaks.
ssl_session_cache shared:SSL:10m;
ssl_session_timeout 1d;
ssl_session_tickets off;

# OCSP stapling — multiple resolvers so a Cloudflare DNS incident
# doesn't stall renewal-time OCSP fetches.
ssl_stapling on;
ssl_stapling_verify on;
resolver 1.1.1.1 1.0.0.1 8.8.8.8 9.9.9.9 valid=300s;
resolver_timeout 5s;

# HSTS — 2 years, includeSubDomains, preload. NB: this directive
# is inherited by `location` blocks ONLY if those blocks define no
# `add_header` of their own. Locations that DO set their own
# headers must `include /etc/nginx/snippets/bwc-asset-headers.conf`
# (which repeats the HSTS line) — see bwc.conf.template.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# HTTP/2 + large-cookie buffer tuning. BWC accumulates several
# cookies on long admin sessions (session JWT + CSRF + pre-CSRF +
# edit_mode) — total request headers can cross the 8k default and
# cause stack-mismatch 520s on Safari/HTTP-2 builds (project-wide
# known issue). 16k buffers x 8 covers worst-case admin pages.
# Note: `http2_max_field_size` / `http2_max_header_size` were
# removed in nginx 1.25; large_client_header_buffers applies to
# HTTP/2 too in all supported versions, so no legacy directives.
large_client_header_buffers 8 16k;
