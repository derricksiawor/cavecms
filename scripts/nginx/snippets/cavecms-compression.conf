# gzip compression for text responses. brotli would yield better
# ratios but ships as a third-party module (ngx_brotli) that bumps
# build complexity and isn't in the stock Ubuntu nginx package. The
# bandwidth/CPU trade-off here is the same defaults Cloudflare uses
# at their edge — level 6 is the sweet spot.
#
# `gzip_proxied` makes nginx gzip even when serving a response
# upstream-marked private/no-cache; without it API JSON would ship
# uncompressed and inflate the dashboard payload ~3x.
gzip on;
gzip_vary on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
  text/plain
  text/css
  text/xml
  application/json
  application/javascript
  application/rss+xml
  application/atom+xml
  image/svg+xml
  application/manifest+json;
gzip_proxied no-store no-cache private expired auth;
