# Headers included at every static-asset / maintenance location.
# `add_header` is NOT additive across nesting levels in nginx — once
# a `location` defines any `add_header`, the inherited headers
# (Strict-Transport-Security, etc.) are dropped from that response.
# Each static block therefore explicitly includes HSTS + X-Content-
# Type-Options here so the inherited server-level headers don't
# silently disappear from /_next/static/* and /uploads/* responses.
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
add_header X-Content-Type-Options "nosniff" always;
