# Shared proxy headers + body limits for every location that
# forwards to the upstream Next.js process. Include via:
#   include /etc/nginx/snippets/cavecms-proxy.conf;
#
# X-Real-IP is the TRUST BOUNDARY for the app — the rate limiter
# reads it via clientIpFromHeaders. We set it to $remote_addr (the
# TCP peer nginx sees) so a client-supplied X-Real-IP can't poison
# the per-IP bucket. X-Forwarded-For is OVERWRITTEN (not
# appended) so spoofed chains don't survive nginx; if a future
# edge tier (Cloudflare/Fastly) is added in front, this directive
# AND lib/http/clientIp.ts must change in lockstep to read the
# edge's trusted header.
proxy_http_version 1.1;
proxy_set_header Host $host;
proxy_set_header X-Real-IP $remote_addr;
proxy_set_header X-Forwarded-For $remote_addr;
proxy_set_header X-Forwarded-Proto $scheme;
proxy_set_header Connection "";

# Strip any X-Powered-By the upstream might emit. The Next config
# already sets `poweredByHeader: false`, but this is
# defence-in-depth against future regressions.
proxy_hide_header X-Powered-By;

# 30s for the standard request path — generous against a slow DB
# transaction but short enough that a slowloris-ish upstream stall
# doesn't tie up the worker pool.
proxy_read_timeout 30s;
proxy_send_timeout 30s;
