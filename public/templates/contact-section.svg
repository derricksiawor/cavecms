<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" fill="none" role="img" aria-label="Two-up contact section schematic">
  <rect width="320" height="180" fill="#0a0a0a"/>
  <g stroke="#3a3a3a" stroke-width="0.6">
    <rect x="20" y="20" width="135" height="140" rx="3" fill="none"/>
    <rect x="165" y="20" width="135" height="140" rx="3" fill="none"/>
  </g>
  <!-- Left column: address + social -->
  <rect x="34" y="36" width="100" height="7" rx="1" fill="#c97f2c"/>
  <g fill="#cdc4b6" opacity="0.55">
    <rect x="34" y="56" width="100" height="3" rx="1"/>
    <rect x="34" y="64" width="80" height="3" rx="1"/>
    <rect x="34" y="72" width="110" height="3" rx="1"/>
  </g>
  <g fill="#c97f2c">
    <circle cx="42" cy="98" r="6" opacity="0.85"/>
    <circle cx="60" cy="98" r="6" opacity="0.85"/>
    <circle cx="78" cy="98" r="6" opacity="0.85"/>
  </g>
  <!-- Right column: CTA -->
  <rect x="179" y="36" width="100" height="7" rx="1" fill="#c97f2c"/>
  <g fill="#cdc4b6" opacity="0.55">
    <rect x="179" y="56" width="100" height="3" rx="1"/>
    <rect x="179" y="64" width="80" height="3" rx="1"/>
    <rect x="179" y="72" width="100" height="3" rx="1"/>
  </g>
  <rect x="179" y="100" width="80" height="14" rx="2" fill="#c97f2c"/>
</svg>
